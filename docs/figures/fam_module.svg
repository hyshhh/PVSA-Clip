<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263238"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #102027; }
      .label { font: 600 17px Arial, sans-serif; fill: #102027; }
      .small { font: 500 14px Arial, sans-serif; fill: #263238; }
      .tiny { font: 500 12px Arial, sans-serif; fill: #37474f; }
      .box { stroke: #263238; stroke-width: 1.8; rx: 14; ry: 14; }
      .line { stroke: #263238; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #607d8b; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #607d8b; stroke-width: 1.7; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .sum { fill: #ffffff; stroke: #263238; stroke-width: 2; }
    </style>
  </defs>

  <rect x="0" y="0" width="1320" height="760" fill="#f7faf9"/>
  <text x="660" y="46" text-anchor="middle" class="title">Feature Alignment Module (FAM)</text>
  <text x="660" y="74" text-anchor="middle" class="small">Normalized Bidirectional Channel-Spatial Alignment for CNN-Transformer Fusion</text>

  <!-- Inputs -->
  <rect x="55" y="145" width="185" height="74" fill="#d7ebff" class="box"/>
  <text x="147" y="174" text-anchor="middle" class="label">Transformer</text>
  <text x="147" y="199" text-anchor="middle" class="small">X<tspan baseline-shift="sub">T</tspan> ∈ R<tspan baseline-shift="super">B×C×H×W</tspan></text>

  <rect x="55" y="535" width="185" height="74" fill="#dff6dd" class="box"/>
  <text x="147" y="564" text-anchor="middle" class="label">CNN</text>
  <text x="147" y="589" text-anchor="middle" class="small">X<tspan baseline-shift="sub">C</tspan> ∈ R<tspan baseline-shift="super">B×C×H×W</tspan></text>

  <!-- Norm blocks -->
  <rect x="300" y="145" width="155" height="74" fill="#e8f1f8" class="box"/>
  <text x="377" y="176" text-anchor="middle" class="label">GroupNorm</text>
  <text x="377" y="200" text-anchor="middle" class="small">X<tspan baseline-shift="sub">T</tspan><tspan baseline-shift="super">n</tspan></text>

  <rect x="300" y="535" width="155" height="74" fill="#eaf7e8" class="box"/>
  <text x="377" y="566" text-anchor="middle" class="label">GroupNorm</text>
  <text x="377" y="590" text-anchor="middle" class="small">X<tspan baseline-shift="sub">C</tspan><tspan baseline-shift="super">n</tspan></text>

  <!-- Alignment projections -->
  <rect x="515" y="145" width="170" height="74" fill="#fff1cc" class="box"/>
  <text x="600" y="176" text-anchor="middle" class="label">1×1 Conv</text>
  <text x="600" y="200" text-anchor="middle" class="small">C→C, align T→C</text>

  <rect x="515" y="535" width="170" height="74" fill="#fff1cc" class="box"/>
  <text x="600" y="566" text-anchor="middle" class="label">1×1 Conv</text>
  <text x="600" y="590" text-anchor="middle" class="small">C→C, align C→T</text>

  <!-- Attention branch -->
  <rect x="480" y="298" width="360" height="164" fill="#fff9e6" class="box"/>
  <text x="660" y="325" text-anchor="middle" class="label">Channel-Spatial Attention</text>
  <text x="660" y="352" text-anchor="middle" class="small">Input: normalized pair (X<tspan baseline-shift="sub">T</tspan><tspan baseline-shift="super">n</tspan>, X<tspan baseline-shift="sub">C</tspan><tspan baseline-shift="super">n</tspan>)</text>
  <rect x="510" y="373" width="135" height="58" fill="#ffe0b2" class="box"/>
  <text x="577" y="397" text-anchor="middle" class="small">Channel gate</text>
  <text x="577" y="417" text-anchor="middle" class="tiny">GAP/GMP on sum &amp; diff</text>
  <rect x="675" y="373" width="135" height="58" fill="#ffecb3" class="box"/>
  <text x="742" y="397" text-anchor="middle" class="small">Spatial gate</text>
  <text x="742" y="417" text-anchor="middle" class="tiny">mean/max maps</text>
  <text x="660" y="450" text-anchor="middle" class="small">A<tspan baseline-shift="sub">T</tspan>, A<tspan baseline-shift="sub">C</tspan> ∈ [0,1]</text>

  <!-- Mix scale -->
  <rect x="890" y="317" width="170" height="126" fill="#f3e5f5" class="box"/>
  <text x="975" y="348" text-anchor="middle" class="label">Bounded Scale</text>
  <text x="975" y="375" text-anchor="middle" class="small">α = α<tspan baseline-shift="sub">max</tspan> · sigmoid(s)</text>
  <text x="975" y="400" text-anchor="middle" class="small">init α = 0.1</text>
  <text x="975" y="425" text-anchor="middle" class="small">α<tspan baseline-shift="sub">max</tspan> = 0.25</text>

  <!-- Fusion equations -->
  <rect x="760" y="120" width="255" height="124" fill="#e3f2fd" class="box"/>
  <text x="887" y="148" text-anchor="middle" class="label">Transformer Update</text>
  <text x="887" y="176" text-anchor="middle" class="small">Δ<tspan baseline-shift="sub">T</tspan> = A<tspan baseline-shift="sub">C</tspan> ⊙ (P<tspan baseline-shift="sub">C→T</tspan> - X<tspan baseline-shift="sub">T</tspan><tspan baseline-shift="super">n</tspan>)</text>
  <text x="887" y="204" text-anchor="middle" class="small">Y<tspan baseline-shift="sub">T</tspan> = X<tspan baseline-shift="sub">T</tspan> + αΔ<tspan baseline-shift="sub">T</tspan></text>

  <rect x="760" y="510" width="255" height="124" fill="#e8f5e9" class="box"/>
  <text x="887" y="538" text-anchor="middle" class="label">CNN Update</text>
  <text x="887" y="566" text-anchor="middle" class="small">Δ<tspan baseline-shift="sub">C</tspan> = A<tspan baseline-shift="sub">T</tspan> ⊙ (P<tspan baseline-shift="sub">T→C</tspan> - X<tspan baseline-shift="sub">C</tspan><tspan baseline-shift="super">n</tspan>)</text>
  <text x="887" y="594" text-anchor="middle" class="small">Y<tspan baseline-shift="sub">C</tspan> = X<tspan baseline-shift="sub">C</tspan> + αΔ<tspan baseline-shift="sub">C</tspan></text>

  <!-- Outputs -->
  <rect x="1100" y="145" width="170" height="74" fill="#bbdefb" class="box"/>
  <text x="1185" y="176" text-anchor="middle" class="label">Y<tspan baseline-shift="sub">T</tspan></text>
  <text x="1185" y="200" text-anchor="middle" class="small">B×C×H×W</text>

  <rect x="1100" y="535" width="170" height="74" fill="#c8e6c9" class="box"/>
  <text x="1185" y="566" text-anchor="middle" class="label">Y<tspan baseline-shift="sub">C</tspan></text>
  <text x="1185" y="590" text-anchor="middle" class="small">B×C×H×W</text>

  <!-- Arrows main -->
  <path d="M240 182 L300 182" class="line"/>
  <path d="M455 182 L515 182" class="line"/>
  <path d="M685 182 L760 182" class="line"/>
  <path d="M1015 182 L1100 182" class="line"/>

  <path d="M240 572 L300 572" class="line"/>
  <path d="M455 572 L515 572" class="line"/>
  <path d="M685 572 L760 572" class="line"/>
  <path d="M1015 572 L1100 572" class="line"/>

  <!-- Residual bypass -->
  <path d="M147 219 C150 260, 1045 260, 1100 190" class="dash"/>
  <path d="M147 535 C150 495, 1045 495, 1100 572" class="dash"/>
  <text x="602" y="266" text-anchor="middle" class="tiny">identity residual</text>
  <text x="602" y="500" text-anchor="middle" class="tiny">identity residual</text>

  <!-- Attention arrows -->
  <path d="M377 219 C390 275, 520 285, 560 298" class="thin"/>
  <path d="M377 535 C390 480, 520 475, 560 462" class="thin"/>
  <path d="M810 380 L890 380" class="thin"/>
  <path d="M975 317 C970 250, 930 245, 900 244" class="thin"/>
  <path d="M975 443 C970 500, 930 505, 900 510" class="thin"/>

  <!-- Cross projection arrows -->
  <path d="M600 535 C640 480, 720 270, 760 207" class="thin"/>
  <path d="M600 219 C640 275, 720 480, 760 545" class="thin"/>

  <text x="600" y="706" text-anchor="middle" class="small">Key idea: normalize both branches before interaction, align cross-branch features with 1×1 projections, and use bounded residual updates.</text>
</svg>
